<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 艺术分析助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
        .input-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            color: #fff;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        .result-box {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            min-height: 300px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 15px;
            overflow-y: auto;
            max-height: 600px;
        }
        .loading { color: #feca57; text-align: center; padding: 50px; }
        .error { color: #ff6b6b; }
        .link-box {
            background: rgba(0,255,0,0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        .link-box a { color: #48dbfb; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 艺术分析助手</h1>
        <p class="subtitle">基于 AG2 多智能体框架</p>
        
        <div class="link-box">
            如果页面无法响应请点击 → <a id="altLink" href="#">使用备用链接</a>
        </div>
        
        <div class="input-box">
            <input type="text" id="artwork" placeholder="输入艺术作品名称，如：蒙娜丽莎、星空、向日葵" 
                   onkeypress="if(event.key==='Enter')analyze()">
            <button onclick="analyze()">开始分析</button>
        </div>
        
        <div class="result-box" id="result">
            <p style="color:#888;text-align:center;margin-top:100px;">
                🎨 输入艺术作品名称，点击"开始分析"<br><br>
                建议作品：蒙娜丽莎、星空、向日葵、最后的晚餐、记忆的永恒、格尔尼卡
            </p>
        </div>
    </div>

    <script>
        // 动态获取当前服务器地址
        const API_BASE = window.location.origin;
        document.getElementById('altLink').href = API_BASE + '/ai?artwork=蒙娜丽莎';
        
        let loading = false;
        
        function analyze() {
            const input = document.getElementById('artwork').value.trim();
            const resultDiv = document.getElementById('result');
            
            if (!input) {
                resultDiv.innerHTML = '<p class="error">请输入艺术作品名称</p>';
                return;
            }
            
            if (loading) return;
            loading = true;
            
            resultDiv.innerHTML = '<p class="loading">🎨 AI正在分析中，请稍候...</p>';
            
            // 使用 iframe 下载方式获取结果
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            iframe.name = 'downloadFrame';
            
            // 创建表单
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = API_BASE + '/api/analyze';
            form.target = 'downloadFrame';
            
            const inputEl = document.createElement('input');
            inputEl.type = 'hidden';
            inputEl.name = 'artwork';
            inputEl.value = input;
            
            form.appendChild(inputEl);
            
            // 使用fetch轮询结果
            fetch(API_BASE + '/api/analyze?q=' + encodeURIComponent(input), {
                method: 'GET',
                mode: 'cors'
            })
            .then(r => r.json())
            .then(data => {
                loading = false;
                if (data.success) {
                    resultDiv.innerHTML = data.result;
                } else {
                    resultDiv.innerHTML = '<p class="error">分析失败: ' + (data.error || '未知错误') + '</p>';
                }
            })
            .catch(err => {
                loading = false;
                // 如果fetch失败，使用表单提交作为后备
                console.log('Fetch failed, using form submit:', err);
                resultDiv.innerHTML = '<p class="loading">正在跳转分析...</p>';
                document.body.appendChild(iframe);
                document.body.appendChild(form);
                form.submit();
            });
        }
    </script>
</body>
</html>
