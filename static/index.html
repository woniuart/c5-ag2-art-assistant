<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 艺术分析助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
        .input-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 70%;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            color: #fff;
            cursor: pointer;
        }
        .result-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            min-height: 100px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 15px;
            overflow-y: auto;
            max-height: 600px;
        }
        .loading { color: #feca57; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 艺术分析助手</h1>
        <p class="subtitle">基于 AG2 多智能体框架</p>
        
        <!-- 这个表单会自动提交到根路径 -->
        <div class="input-box">
            <form method="GET" action="/" id="analysisForm" style="display:flex;gap:10px;flex-wrap:wrap;">
                <input type="text" name="q" id="artworkInput" placeholder="输入艺术作品名称，如：蒙娜丽莎、星空" value="">
                <button type="submit" id="submitBtn">开始分析</button>
            </form>
        </div>
        
        <div class="result-box" id="result">
            <p style="color:#888;text-align:center;margin-top:20px;">
                输入作品名称，点击"开始分析"<br><br>
                建议：蒙娜丽莎、星空、向日葵
            </p>
        </div>
    </div>

    <script>
        // 自动检测URL参数并处理
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        
        // 如果有查询参数，显示loading
        if (query) {
            document.getElementById('artworkInput').value = query;
            document.getElementById('submitBtn').disabled = true;
            document.getElementById('result').innerHTML = '<p class="loading">🎨 正在分析: ' + query + '</p>';
            
            // 设置一个定时器轮询结果
            // 由于服务器会处理分析，这里我们暂时等待
            // 使用meta refresh来触发服务端渲染的页面
            setTimeout(function() {
                // 重新加载当前页面，让服务端处理分析
                window.location.reload();
            }, 2000);
        }
    </script>
</body>
</html>
