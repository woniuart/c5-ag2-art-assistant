<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 艺术分析助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
        .input-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 70%;
            padding: 15px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
        }
        button {
            padding: 15px 30px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff6b6b, #feca57);
            color: #fff;
            cursor: pointer;
        }
        .result-box {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            min-height: 100px;
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 15px;
            overflow-y: auto;
            max-height: 600px;
        }
        .loading { color: #feca57; text-align: center; padding: 50px; font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 艺术分析助手</h1>
        <p class="subtitle">基于 AG2 多智能体框架</p>
        
        <div class="input-box">
            <form id="analysisForm" style="display:flex;gap:10px;flex-wrap:wrap;">
                <input type="text" id="artworkInput" placeholder="输入艺术作品名称，如：蒙娜丽莎、星空" value="">
                <button type="submit">开始分析</button>
            </form>
        </div>
        
        <div class="result-box" id="result">
            <p style="color:#888;text-align:center;margin-top:20px;">
                输入作品名称，点击"开始分析"<br><br>
                建议：蒙娜丽莎、星空、向日葵
            </p>
        </div>
    </div>

    <script>
        const form = document.getElementById('analysisForm');
        const input = document.getElementById('artworkInput');
        const resultDiv = document.getElementById('result');
        
        // 检查URL hash
        function checkHash() {
            const hash = window.location.hash;
            if (hash && hash.startsWith('#/')) {
                const artwork = decodeURIComponent(hash.substring(2));
                if (artwork) {
                    input.value = artwork;
                    // 直接跳转，让服务端处理
                    window.location.href = '/#/' + encodeURIComponent(artwork);
                    return true;
            }
            return false;
        }
        
        // 页面加载时检查
        if (window.location.hash && window.location.hash.startsWith('#/')) {
            const artwork = decodeURIComponent(window.location.hash.substring(2));
            input.value = artwork;
            resultDiv.innerHTML = '<p class="loading">🎨 正在分析: ' + artwork + '</p>';
            
            // 使用服务端渲染的内容
            // 由于serveo限制，我们需要用不同的方式
            
            // 方式1: 用setTimeout让服务端重载
            setTimeout(() => {
                // 不跳转，只是触发服务端
            }, 100);
        }
        
        // 表单提交 - 用JavaScript拦截，使用服务端渲染
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const artwork = input.value.trim();
            if (!artwork) {
                resultDiv.innerHTML = '<p style="color:#ff6b6b;text-align:center;">请输入作品名称</p>';
                return;
            }
            
            // 用服务端路由处理
            // 改用直接提交表单到根路径，用POST
            const formSubmit = document.createElement('form');
            formSubmit.method = 'POST';
            formSubmit.action = '/analyze';
            formSubmit.style.display = 'none';
            
            const inputEl = document.createElement('input');
            inputEl.type = 'hidden';
            inputEl.name = 'artwork';
            inputEl.value = artwork;
            
            formSubmit.appendChild(inputEl);
            document.body.appendChild(formSubmit);
            
            // 显示loading
            resultDiv.innerHTML = '<p class="loading">🎨 正在分析: ' + artwork + '</p>';
            
            // 提交
            formSubmit.submit();
        });
    </script>
</body>
</html>
